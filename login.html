<!DOCTYPE html>
<html>
<head>
    <title>Login - Art Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-bg">

<h2>Explore history through art</h2>

<div class="login-box">
    <form action="homepage.html">
        <label>Username</label>
        <input type="text" required placeholder="Username" style="border-radius: 8px;">

        <label>Password</label>
        <input type="password" required placeholder="Password" style="border-radius: 8px;">

        <button type="submit" style="border-radius: 8px;">Login</button>
    </form>
</div>

</body>
</html>
