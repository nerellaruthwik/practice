<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gallery | House of Artworks</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <h1>Explore the Gallery</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="visitor.html" class="active">Gallery</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <main>
    <section class="virtual-tour">
      <h2>Virtual Gallery Tour</h2>
      <p>Click below to start exploring the artworks interactively!</p>
      <button onclick="alert('Virtual tour coming soon!')">Start Tour</button>
    </section>

    <section class="art-list">
      <h2>Available Artworks</h2>
      <div class="art-grid">
        <div class="art-card">
          <img src="https://upload.wikimedia.org/wikipedia/commons/2/22/Giovanni_Paolo_Panini_-_Interior_of_the_Pantheon%2C_Rome_-_Google_Art_Project.jpg" alt="">

          <p>Giovanni Paolo Panini, c. 1734</p>
          <button>Buy Now</button>
        </div>
        <div class="art-card">
          <img src="https://m.media-amazon.com/images/I/910AD6dqhXL._UF894,1000_QL80_.jpg" alt="">
          <h3>Autumn Forest Landscape</h3>
          <p>Contemporary Painting</p>
          <button>Buy Now</button>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2025 House of Artworks</p>
  </footer>

</html>
